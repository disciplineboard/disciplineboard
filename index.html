    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        body { background-color: #0f1115; color: #ffffff; overscroll-behavior-y: none; }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 8px; height: 8px; display: none; }
        @media (min-width: 768px) { ::-webkit-scrollbar { display: block; } }
        ::-webkit-scrollbar-track { background: #0f1115; }
        ::-webkit-scrollbar-thumb { background: #1a1d24; border-radius: 4px; border: 1px solid #333; }
        ::-webkit-scrollbar-thumb:hover { background: #333; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; display: block; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        /* Checkbox */
        .custom-checkbox input:checked ~ div { background-color: #00ff88; border-color: #00ff88; }
        .custom-checkbox input:checked ~ div:after { display: block; }

        /* Date picker */
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

        /* Drag & drop */
        .dragging  { opacity: 0.5; background-color: #1a1d24; border: 1px dashed #00ff88; }
        .drag-over { border-top: 2px solid #00ff88; }

        /* Safe area (iOS) */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }

        /* Animations */
        @keyframes fadeIn  { from { opacity: 0; }                         to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pop     { 0%,100% { transform: scale(1); }             50% { transform: scale(1.08); } }

        .animate-fade-in  { animation: fadeIn  0.5s ease-out; }
        .animate-slide-up { animation: slideUp 0.4s ease-out; }
        .animate-pop      { animation: pop     0.3s ease; }

    <div id="app" class="max-w-7xl mx-auto p-4 md:p-8">
        <!-- Affichage immédiat du spinner pendant le chargement des scripts -->
        <div id="boot-loader" class="min-h-screen flex items-center justify-center">
            <div class="text-center">
                <div style="width:64px;height:64px;border-radius:50%;border:4px solid #00ff88;border-top-color:transparent;animation:spin 0.8s linear infinite;margin:0 auto 24px;"></div>
                <p style="color:#a0a5b1;font-size:12px;text-transform:uppercase;letter-spacing:0.1em;">Chargement...</p>

    <!-- ── Vision Board : upload depuis l'appareil ── -->
    <input type="file" id="visionFileInput" accept="image/*" multiple class="hidden"
           onchange="handleVisionFileUpload(event)">

    <script>
    /* Compress & store an uploaded file as base64 in visionImages */
    function handleVisionFileUpload(event) {
        Array.from(event.target.files).forEach(function(file) {
            var reader = new FileReader();
            reader.onload = function(e) {
                var img = new Image();
                img.onload = function() {
                    var MAX = 1200;
                    var w = img.width, h = img.height;
                    if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
                    if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
                    var canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    var dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                    if (typeof updateState === 'function') {
                        updateState({ visionImages: [dataUrl].concat(state.visionImages) });
                    }
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
        event.target.value = ''; // reset so same file can be re-selected
    }

    /* Monkey-patch renderVisionBoard once app.js has loaded */
    (function waitForApp() {
        if (typeof renderVisionBoard !== 'function') {
            return setTimeout(waitForApp, 80);
        }
        var _orig = renderVisionBoard;
        window.renderVisionBoard = function() {
            var html = _orig();
            /* Upload button injected right after the existing "+ Ajouter" submit button */
            var uploadBtn =
                '<button type="button" ' +
                'onclick="document.getElementById('visionFileInput').click()" ' +
                'class="bg-neon/20 border border-neon/40 text-neon px-4 py-2 rounded-lg font-bold ' +
                'flex items-center gap-2 text-sm hover:bg-neon/30 transition shrink-0" ' +
                'title="Uploader depuis l'appareil">' +
                '<i data-lucide="image-plus" class="w-4 h-4"></i>' +
                '<span class="hidden sm:inline">Uploader</span>' +
                '</button>';
            /* Target: closing </form> of the URL input form inside vision board */
            html = html.replace(
                '<span class="hidden sm:inline">Ajouter</span></button></form>',
                '<span class="hidden sm:inline">Ajouter</span></button></form>' + uploadBtn
            );
            return html;
        };
    })();
    </script>
